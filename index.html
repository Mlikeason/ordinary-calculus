<script>
/* ============================================================
   微积分自学 web app · 单文件实现
   ============================================================ */

// ---------- SVG Function Plotter Utility ----------
function svgPlot(opts) {
  const {
    fn,                       // function or array of {fn, color, dashed, label}
    xMin = -5, xMax = 5,
    yMin = -5, yMax = 5,
    width = 560, height = 320,
    samples = 400,
    points = [],              // [{x, y, color, hollow, label}]
    extras = [],              // raw SVG fragments
    title = '',
    axisLabels = {x: 'x', y: 'y'},
  } = opts;

  const padL = 38, padR = 14, padT = 14, padB = 28;
  const plotW = width - padL - padR;
  const plotH = height - padT - padB;
  const sx = x => padL + ((x - xMin) / (xMax - xMin)) * plotW;
  const sy = y => padT + (1 - (y - yMin) / (yMax - yMin)) * plotH;

  const fns = Array.isArray(fn) ? fn : (fn ? [{fn, color: '#2c4a7a'}] : []);

  // Grid
  let grid = '';
  for (let gx = Math.ceil(xMin); gx <= Math.floor(xMax); gx++) {
    const x = sx(gx);
    grid += `<line x1="${x}" y1="${padT}" x2="${x}" y2="${padT + plotH}" stroke="#eee" stroke-width="1"/>`;
    if (gx !== 0) grid += `<text x="${x}" y="${padT + plotH + 14}" font-size="10" fill="#888" text-anchor="middle">${gx}</text>`;
  }
  for (let gy = Math.ceil(yMin); gy <= Math.floor(yMax); gy++) {
    const y = sy(gy);
    grid += `<line x1="${padL}" y1="${y}" x2="${padL + plotW}" y2="${y}" stroke="#eee" stroke-width="1"/>`;
    if (gy !== 0) grid += `<text x="${padL - 4}" y="${y + 3}" font-size="10" fill="#888" text-anchor="end">${gy}</text>`;
  }

  // Axes
  const x0 = (0 >= xMin && 0 <= xMax) ? sx(0) : null;
  const y0 = (0 >= yMin && 0 <= yMax) ? sy(0) : null;
  let axes = '';
  if (y0 !== null) axes += `<line x1="${padL}" y1="${y0}" x2="${padL + plotW}" y2="${y0}" stroke="#666" stroke-width="1"/>`;
  if (x0 !== null) axes += `<line x1="${x0}" y1="${padT}" x2="${x0}" y2="${padT + plotH}" stroke="#666" stroke-width="1"/>`;

  // Function paths
  let paths = '';
  for (const f of fns) {
    let d = '';
    let prevValid = false;
    for (let i = 0; i <= samples; i++) {
      const x = xMin + (i / samples) * (xMax - xMin);
      let y;
      try { y = f.fn(x); } catch(e) { y = NaN; }
      if (!isFinite(y)) { prevValid = false; continue; }
      if (y < yMin - (yMax - yMin) || y > yMax + (yMax - yMin)) { prevValid = false; continue; }
      const px = sx(x), py = sy(Math.max(yMin - 10, Math.min(yMax + 10, y)));
      d += (prevValid ? ' L' : ' M') + px.toFixed(2) + ' ' + py.toFixed(2);
      prevValid = true;
    }
    paths += `<path d="${d.trim()}" fill="none" stroke="${f.color || '#2c4a7a'}" stroke-width="${f.width || 2}" ${f.dashed ? 'stroke-dasharray="5 4"' : ''}/>`;
  }

  // Points
  let pts = '';
  for (const p of points) {
    const px = sx(p.x), py = sy(p.y);
    if (p.hollow) {
      pts += `<circle cx="${px}" cy="${py}" r="5" fill="white" stroke="${p.color || '#2c4a7a'}" stroke-width="2"/>`;
    } else {
      pts += `<circle cx="${px}" cy="${py}" r="4.5" fill="${p.color || '#2c4a7a'}"/>`;
    }
    if (p.label) {
      pts += `<text x="${px + 8}" y="${py - 8}" font-size="11" fill="${p.color || '#2c4a7a'}">${p.label}</text>`;
    }
  }

  // Legend
  let legend = '';
  if (fns.some(f => f.label)) {
    let lx = padL + 8, ly = padT + 14;
    for (const f of fns) {
      if (!f.label) continue;
      legend += `<line x1="${lx}" y1="${ly}" x2="${lx + 18}" y2="${ly}" stroke="${f.color || '#2c4a7a'}" stroke-width="2" ${f.dashed ? 'stroke-dasharray="4 3"' : ''}/>`;
      legend += `<text x="${lx + 24}" y="${ly + 4}" font-size="11" fill="#333">${f.label}</text>`;
      ly += 16;
    }
  }

  const titleEl = title ? `<text x="${width/2}" y="${padT - 2}" font-size="11" fill="#666" text-anchor="middle">${title}</text>` : '';

  return `<svg viewBox="0 0 ${width} ${height}" width="100%" style="max-width:${width}px; display:block;" xmlns="http://www.w3.org/2000/svg">
    ${grid}${axes}${paths}${extras.join('')}${pts}${legend}${titleEl}
  </svg>`;
}

// ---------- Lessons Data ----------
const MODULES = [
  { id: 'M1', name: '预备知识', desc: '函数与初等运算' },
  { id: 'M2', name: '极限与连续', desc: '微积分的基石' },
  { id: 'M3', name: '导数', desc: '微积分的核心 · 7 节完整' },
  { id: 'M4', name: '导数的应用', desc: '即将开放…' },
  { id: 'M5', name: '积分', desc: '即将开放…' },
  { id: 'M6', name: '积分的应用', desc: '即将开放…' },
];

const LESSONS = [
  // ============== M1 预备知识 ==============
  {
    id: 1, module: 'M1', title: '函数与图像',
    hook: '函数是把"输入"映射到"输出"的规则。给它一个数，它还你另一个数。',
    sections: [
      { type: 'text', html: `
        <p><strong>定义</strong>。函数 $f: A \\to B$ 是一个规则：对集合 $A$ 中的每个 $x$，唯一对应集合 $B$ 中的一个值 $f(x)$。$A$ 称为<strong>定义域</strong>，所有 $f(x)$ 的集合称为<strong>值域</strong>。</p>
        <p><strong>图像</strong>。在坐标系中描出所有形如 $(x, f(x))$ 的点，连成的轨迹就是函数的图像。"竖线检验"：任何一条竖线和图像至多交于一点。</p>
        <p>三类常见的初等函数：</p>
        <ul>
          <li>线性：$f(x) = ax + b$，图像是直线</li>
          <li>二次：$f(x) = ax^2 + bx + c$，图像是抛物线</li>
          <li>幂函数：$f(x) = x^n$（如 $x^3$、$\\sqrt{x} = x^{1/2}$）</li>
        </ul>
        <p><strong>定义域</strong>由两类限制决定：① 分母不能为零；② 偶次根号下要非负。例如 $f(x) = \\dfrac{1}{\\sqrt{x-1}}$ 要求 $x > 1$。</p>
      `},
      { type: 'viz', id: 'viz-l1', label: '可切换不同函数观察图像' },
    ],
    exercises: [
      {
        type: 'mc',
        q: '函数 $f(x) = \\sqrt{x - 3}$ 的定义域是？',
        options: ['$x > 0$', '$x \\geq 3$', '$x \\neq 3$', '$\\mathbb{R}$'],
        answer: 1,
        solution: '根号下要非负：$x - 3 \\geq 0 \\Rightarrow x \\geq 3$。',
      },
      {
        type: 'fill',
        q: '若 $f(x) = x^2 + 1$，则 $f(-2) = $',
        answer: '5',
        solution: '$f(-2) = (-2)^2 + 1 = 4 + 1 = 5$。',
      },
      {
        type: 'mc',
        q: '下列哪条曲线<strong>不是</strong>函数？',
        options: ['$y = x^2$', '$y = \\pm\\sqrt{x}$（圆的右半）', '$y = \\sin x$', '$y = e^x$'],
        answer: 1,
        solution: '$y = \\pm\\sqrt{x}$ 对同一 $x$ 给出两个 $y$ 值，违反"唯一对应"。竖线检验也通不过。',
      },
    ],
  },

  {
    id: 2, module: 'M1', title: '复合与反函数',
    hook: '函数可以"套娃"，也可以"反过来用"。',
    sections: [
      { type: 'text', html: `
        <p><strong>复合函数</strong>。先用 $g$ 再用 $f$，记作 $(f \\circ g)(x) = f(g(x))$。注意顺序——外层函数在左边。</p>
        <p>例：$f(x) = 2x + 1$，$g(x) = x^2$，则 $(f \\circ g)(x) = 2x^2 + 1$，而 $(g \\circ f)(x) = (2x+1)^2$。两者通常不相等。</p>
        <p><strong>反函数</strong>。若 $f$ 是一一对应（每个 $y$ 只对应一个 $x$），则存在 $f^{-1}$ 满足</p>
        <p>$$f(f^{-1}(x)) = x, \\quad f^{-1}(f(x)) = x.$$</p>
        <p><strong>求反函数三步</strong>：① 写 $y = f(x)$；② 解出 $x$ 用 $y$ 表示；③ 交换 $x, y$。</p>
        <p>例：$f(x) = 2x + 1 \\Rightarrow y = 2x+1 \\Rightarrow x = \\dfrac{y-1}{2} \\Rightarrow f^{-1}(x) = \\dfrac{x-1}{2}$。</p>
        <p><strong>几何性质</strong>：$f$ 与 $f^{-1}$ 的图像关于直线 $y = x$ 对称。</p>
      `},
      { type: 'viz', id: 'viz-l2', label: '观察 $f$ 与 $f^{-1}$ 关于 $y=x$ 对称' },
    ],
    exercises: [
      {
        type: 'fill',
        q: '若 $f(x) = x + 1$，$g(x) = x^2$，则 $f(g(2)) = $',
        answer: '5',
        solution: '$g(2) = 4$，$f(4) = 4 + 1 = 5$。',
      },
      {
        type: 'fill',
        q: '若 $f(x) = x^3$，则 $f^{-1}(8) = $',
        answer: '2',
        solution: '$f^{-1}(x) = \\sqrt[3]{x}$，所以 $f^{-1}(8) = 2$。',
      },
      {
        type: 'mc',
        q: '函数 $f(x) = 3x - 2$ 的反函数是？',
        options: ['$\\dfrac{x+2}{3}$', '$\\dfrac{x-2}{3}$', '$3x + 2$', '$\\dfrac{1}{3x-2}$'],
        answer: 0,
        solution: '设 $y = 3x - 2$，解得 $x = \\dfrac{y+2}{3}$，故 $f^{-1}(x) = \\dfrac{x+2}{3}$。',
      },
    ],
  },

  {
    id: 3, module: 'M1', title: '三角函数',
    hook: '三角函数源于直角三角形的边长比，扩展到所有实数后变成"振荡"的函数。',
    sections: [
      { type: 'text', html: `
        <p><strong>弧度制</strong>。一周 $= 2\\pi$ 弧度 $= 360°$。常用换算：$30° = \\dfrac{\\pi}{6}$，$45° = \\dfrac{\\pi}{4}$，$60° = \\dfrac{\\pi}{3}$，$90° = \\dfrac{\\pi}{2}$。</p>
        <p><strong>单位圆定义</strong>。在单位圆上，从 $x$ 轴正向逆时针转角度 $\\theta$ 到达点 $(\\cos\\theta, \\sin\\theta)$。这把三角函数从直角三角形扩展到了任意实数。</p>
        <p><strong>核心恒等式</strong>：</p>
        <p>$$\\sin^2\\theta + \\cos^2\\theta = 1, \\quad \\tan\\theta = \\dfrac{\\sin\\theta}{\\cos\\theta}.$$</p>
        <p><strong>必背特殊值</strong>：</p>
        <ul>
          <li>$\\sin 0 = 0$，$\\sin\\dfrac{\\pi}{6} = \\dfrac{1}{2}$，$\\sin\\dfrac{\\pi}{4} = \\dfrac{\\sqrt{2}}{2}$，$\\sin\\dfrac{\\pi}{3} = \\dfrac{\\sqrt{3}}{2}$，$\\sin\\dfrac{\\pi}{2} = 1$</li>
          <li>$\\cos$ 在这些角的值反着排：$1, \\dfrac{\\sqrt{3}}{2}, \\dfrac{\\sqrt{2}}{2}, \\dfrac{1}{2}, 0$</li>
        </ul>
        <p><strong>周期性</strong>：$\\sin, \\cos$ 周期为 $2\\pi$；$\\tan$ 周期为 $\\pi$。</p>
      `},
      { type: 'viz', id: 'viz-l3', label: '拖动滑块：单位圆角度对应正弦曲线' },
    ],
    exercises: [
      {
        type: 'fill',
        q: '$\\sin\\left(\\dfrac{\\pi}{6}\\right) = $（用小数或分数）',
        answer: '1/2',
        accept: ['0.5', '1/2'],
        solution: '$30°$ 的正弦值是 $\\dfrac{1}{2}$。',
      },
      {
        type: 'fill',
        q: '$\\tan\\left(\\dfrac{\\pi}{4}\\right) = $',
        answer: '1',
        solution: '$\\tan\\dfrac{\\pi}{4} = \\dfrac{\\sin(\\pi/4)}{\\cos(\\pi/4)} = 1$。',
      },
      {
        type: 'mc',
        q: '$\\cos^2 x + \\sin^2 x$ 等于？',
        options: ['$x^2$', '$1$', '$2x$', '取决于 $x$'],
        answer: 1,
        solution: '基本恒等式：单位圆上的点 $(\\cos x, \\sin x)$ 到原点距离为 1。',
      },
    ],
  },

  {
    id: 4, module: 'M1', title: '指数与对数',
    hook: '指数描述爆炸式增长，对数是它的"反操作"——问"增长了多少次"。',
    sections: [
      { type: 'text', html: `
        <p><strong>指数</strong>。$a^x$ 其中 $a > 0, a \\neq 1$。运算性质：</p>
        <p>$$a^{x+y} = a^x \\cdot a^y, \\quad (a^x)^y = a^{xy}, \\quad a^0 = 1.$$</p>
        <p><strong>自然底数 $e$</strong>。$e \\approx 2.71828\\ldots$，是微积分中"最自然"的指数底。后面会看到，$\\dfrac{d}{dx}e^x = e^x$，自身就是自身的导数。</p>
        <p><strong>对数</strong>。$\\log_a x = y \\iff a^y = x$。理解为"$a$ 要乘以自己多少次才得到 $x$"。</p>

        <h3 class="serif text-xl font-semibold mt-2 mb-3">极限"懂规矩"</h3>
        <p>设两个函数 $f(x), g(x)$ 在 $x \\to a$ 时分别趋于 $L$ 和 $M$。直觉上："把它们加起来"的趋势就该是 $L + M$；"把它们乘起来"的趋势就该是 $L \\cdot M$。极限就是这么"听话"：</p>
        <p>$$\\lim_{x \\to a}\\bigl[f(x) \\pm g(x)\\bigr] = L \\pm M$$</p>
        <p>$$\\lim_{x \\to a}\\bigl[f(x) \\cdot g(x)\\bigr] = L \\cdot M$$</p>
        <p>$$\\lim_{x \\to a}\\frac{f(x)}{g(x)} = \\frac{L}{M} \\quad (\\text{要求 } M \\neq 0)$$</p>
        <p>$$\\lim_{x \\to a}\\bigl[c \\cdot f(x)\\bigr] = c \\cdot L \\quad (c \\text{ 是常数})$$</p>
        <p>这四条就是<strong>极限的运算法则</strong>。可以放心用。<strong>唯一的坑是除法那条要求 $M \\neq 0$</strong>——这正是 $\\dfrac{0}{0}$ 麻烦的根源。</p>

        <h3 class="serif text-xl font-semibold mt-8 mb-3">代入大法</h3>
        <p>上面四条规则一个直接的推论：<strong>多项式可以直接代入求极限</strong>。举例：</p>
        <p>$$\\lim_{x \\to 2}(x^3 - 3x + 1).$$</p>
        <p>用法则拆开成 $\\lim x^3 - \\lim 3x + \\lim 1$，每一项都直接代入 $x = 2$：$8 - 6 + 1 = 3$。所以极限是 <strong>3</strong>。</p>
        <p>同理，有理函数 $\\dfrac{P(x)}{Q(x)}$（多项式之比）当 $Q(a) \\neq 0$ 时也可以直接代入。例如 $\\lim\\limits_{x \\to 1}\\dfrac{x^2 + 2}{x + 3} = \\dfrac{1 + 2}{1 + 3} = \\dfrac{3}{4}$。</p>
        <div class="rounded-md bg-[var(--accent-soft)] border-l-[3px] border-[var(--accent)] p-4 my-5">

        <div class="rounded-md bg-[var(--accent-soft)] border-l-[3px] border-[var(--accent)] p-4 my-3">

        <p>三种常用招数把那个"小因子"挖出来：</p>

          <li><strong>有理化</strong>：分子或分母含根号时，乘以共轭式（$\\sqrt{a} - \\sqrt{b}$ 配 $\\sqrt{a} + \\sqrt{b}$），把根号"拆开"。</li>

        <p>第三步，现在代入就安全了：$\\lim\\limits_{x \\to 3}(x + 3) = 6$。<strong>答：6。</strong></p>

        <p><strong>为什么是 1？</strong> 在单位圆上，角度 $x$（弧度）对应的弧长就是 $x$；而 $\\sin x$ 是从圆上那一点到 $x$ 轴的<strong>垂线长</strong>。当 $x$ 很小时，那一小段弧几乎就是直的，垂线和弧"几乎一样长"。所以比值越来越靠近 1。</p>

        <p>$$\\lim_{x \\to a} f(x) = f(a).$$</p>

  {
    id: 16, module: 'M3', title: '隐函数与参数方程求导',

    sections: [
      { type: 'text', html: `
        <h3 class="serif text-xl font-semibold mt-2 mb-3">什么是隐函数</h3>
        <p><strong>显函数</strong>：$y = f(x)$，给 $x$ 直接算 $y$，如 $y = x^2 + 1$。</p>
        <p><strong>隐函数</strong>：$y$ 没有显式表达式，只通过方程和 $x$ 关联，如 $x^2 + y^2 = 1$（单位圆）。</p>
        <p>圆上每个 $x \\in (-1, 1)$ 实际对应<strong>两个</strong> $y$（上半圆和下半圆），所以严格说"圆"不是单值函数。但<strong>局部</strong>看，每一段都可以视为 $y$ 关于 $x$ 的函数——只是写不出闭合公式罢了。</p>
        <p>我们想求曲线上某点的切线斜率 $\\dfrac{dy}{dx}$——但 $y$ 都没显式表达，怎么求导？</p>

        <h3 class="serif text-xl font-semibold mt-8 mb-3">隐函数求导：对方程两边求导</h3>
        <div class="rounded-md bg-[var(--accent-soft)] border-l-[3px] border-[var(--accent)] p-4 my-3">
          <strong>做法</strong>：方程两边都对 $x$ 求导。<strong>关键</strong>：把 $y$ 当成 $x$ 的函数——求 $y$ 的某个函数（比如 $y^2$）的导数时，要用<strong>链式法则</strong>。
        </div>
        <p>具体说：</p>
        <ul>
          <li>$(y^2)' = 2y \\cdot y'$（外层 $u^2$ 导出 $2u$，内层 $y$ 对 $x$ 求导是 $y'$）</li>
          <li>$(\\sin y)' = \\cos y \\cdot y'$</li>
          <li>$(e^y)' = e^y \\cdot y'$</li>
        </ul>
        <p>注意每一项后面都跟个 $y'$——这是链式法则在起作用。</p>

        <h3 class="serif text-xl font-semibold mt-8 mb-3">一起做一道（圆）</h3>
        <p>求 $x^2 + y^2 = 1$ 的 $\\dfrac{dy}{dx}$。</p>
        <p>第一步，两边对 $x$ 求导：</p>
        <p>$$(x^2)' + (y^2)' = (1)'$$</p>
        <p>第二步，每项分别处理：</p>
        <ul>
          <li>$(x^2)' = 2x$</li>
          <li>$(y^2)' = 2y \\cdot y'$（链式法则！$y$ 是 $x$ 的函数）</li>
          <li>$(1)' = 0$</li>
        </ul>
        <p>合起来：$2x + 2y \\cdot y' = 0$。</p>

          fn: [
            {fn: fx, color: '#2c4a7a', label: 'f(x) = x²'},
            {fn: secantFn, color: '#b04030', label: '割线（斜率 = ' + slope.toFixed(3) + '）'},
          ],
          xMin: -1, xMax: 3.5, yMin: -1, yMax: 9,
          points: [
            {x: a, y: f0, color: '#2c4a7a'},
            {x: a + h, y: f1, color: '#b04030'},
          ],
        });
        container.querySelector('.viz-svg').innerHTML = svg;
        container.querySelector('.viz-readout').innerHTML =
          `h = ${h.toFixed(3)} &nbsp;|&nbsp; 割线斜率 = (f(1+h) - f(1)) / h = <strong>${slope.toFixed(4)}</strong> &nbsp;|&nbsp; 当 h → 0 极限 = 2 = f′(1)`;
      };
      container.innerHTML = `
        <div class="viz-svg"></div>
        <div class="viz-controls">
          <span style="font-size:0.85em;color:#666;">缩小 h（窗口）:</span>
          <input type="range" min="0.05" max="2" step="0.01" value="${h}">
        </div>
        <div class="viz-readout" style="font-size:0.85em;color:#666;font-family:ui-monospace,monospace;margin-top:0.4em;line-height:1.6;"></div>`;
      container.querySelector('input').oninput = e => { h = parseFloat(e.target.value); draw(); };
      draw();
    },
    'viz-l12': () => {
      const funcs = {
        'x²':    {fn: x => x*x,            deriv: x => 2*x,              label: 'f(x) = x²',          yMin: -2, yMax: 7},
        'x³':    {fn: x => x*x*x,          deriv: x => 3*x*x,            label: 'f(x) = x³',          yMin: -8, yMax: 8},
        'sin x': {fn: x => Math.sin(x),    deriv: x => Math.cos(x),      label: 'f(x) = sin(x)',      yMin: -1.5, yMax: 1.5},
        'eˣ/3':  {fn: x => Math.exp(x)/3,  deriv: x => Math.exp(x)/3,    label: 'f(x) = eˣ/3',        yMin: -1, yMax: 7},
      };
      const keys = Object.keys(funcs);
      let currentKey = keys[0];
      let x0 = 1;
      const draw = () => {
        const f = funcs[currentKey];
        const slope = f.deriv(x0);
        const y0 = f.fn(x0);
        const tangentFn = x => slope * (x - x0) + y0;
        const svg = svgPlot({
          fn: [
            {fn: f.fn,      color: '#2c4a7a', label: f.label},
            {fn: tangentFn, color: '#b04030', label: '切线 (斜率 ' + slope.toFixed(3) + ')'},
          ],
          xMin: -2.5, xMax: 2.5, yMin: f.yMin, yMax: f.yMax,
          points: [{x: x0, y: y0, color: '#b04030'}],
        });
        container.querySelector('.viz-svg').innerHTML = svg;
        container.querySelector('.viz-readout').innerHTML =
          `x₀ = ${x0.toFixed(2)} &nbsp;|&nbsp; f(x₀) = ${y0.toFixed(3)} &nbsp;|&nbsp; <strong>f′(x₀) = ${slope.toFixed(3)}</strong> （切线斜率）`;
      };
      const fnBtns = keys.map(k => `<button data-k="${k}">${k}</button>`).join('');
      container.innerHTML = `
        <div class="viz-svg"></div>
        <div class="viz-controls">${fnBtns}</div>
        <div class="viz-controls" style="margin-top:0.5em;">
          <span style="font-size:0.85em;color:#666;">x₀:</span>
          <input type="range" min="-2.3" max="2.3" step="0.05" value="${x0}">
        </div>
        <div class="viz-readout" style="font-size:0.85em;color:#666;font-family:ui-monospace,monospace;margin-top:0.4em;line-height:1.6;"></div>`;
      container.querySelectorAll('[data-k]').forEach(b => {
        b.classList.toggle('active', b.dataset.k === currentKey);
        b.onclick = () => {
          currentKey = b.dataset.k;
          container.querySelectorAll('[data-k]').forEach(x => x.classList.toggle('active', x.dataset.k === currentKey));
          draw();
        };
      });
      container.querySelector('input[type=range]').oninput = e => { x0 = parseFloat(e.target.value); draw(); };
      draw();
    },
    'viz-l16': () => {
      let theta = Math.PI / 6;
      const draw = () => {
        const cx = Math.cos(theta);
        const cy = Math.sin(theta);
        const slope = Math.abs(cy) < 0.02 ? null : -cx / cy;
        const fns = [
          {fn: x => Math.abs(x) <= 1 ? Math.sqrt(1 - x*x) : NaN, color: '#2c4a7a', label: 'x² + y² = 1'},
          {fn: x => Math.abs(x) <= 1 ? -Math.sqrt(1 - x*x) : NaN, color: '#2c4a7a'},
        ];
        if (slope !== null) fns.push({fn: x => slope * (x - cx) + cy, color: '#b04030', label: '切线 (斜率 ' + slope.toFixed(2) + ')'});
        const svg = svgPlot({
          fn: fns,
          xMin: -1.8, xMax: 1.8, yMin: -1.8, yMax: 1.8,
          points: [{x: cx, y: cy, color: '#b04030'}],
          width: 360, height: 360,
        });
        container.querySelector('.viz-svg').innerHTML = svg;
        const slopeStr = slope === null ? '±∞（垂直切线）' : slope.toFixed(3);
        container.querySelector('.viz-readout').innerHTML =
          `点 (x, y) = (${cx.toFixed(2)}, ${cy.toFixed(2)}) &nbsp;|&nbsp; 切线斜率 = -x/y = <strong>${slopeStr}</strong>`;
      };
      container.innerHTML = `
        <div class="viz-svg" style="display:flex;justify-content:center;"></div>
        <div class="viz-controls">
          <span style="font-size:0.85em;color:#666;">圆上角度 θ:</span>
          <input type="range" min="0" max="6.28" step="0.04" value="${theta}">
        </div>
        <div class="viz-readout" style="font-size:0.85em;color:#666;font-family:ui-monospace,monospace;margin-top:0.4em;"></div>`;
      container.querySelector('input').oninput = e => { theta = parseFloat(e.target.value); draw(); };
      draw();
    },
    'viz-l17': () => {
      const svg = svgPlot({
        fn: [
          {fn: x =>  Math.sin(x), color: '#2c4a7a', label: 'f = sin x'},
          {fn: x =>  Math.cos(x), color: '#b04030', label: "f′ = cos x"},
          {fn: x => -Math.sin(x), color: '#2f7a4d', label: "f″ = -sin x"},
          {fn: x => -Math.cos(x), color: '#c89860', label: "f‴ = -cos x"},
        ],
        xMin: -0.5, xMax: 7,
        yMin: -1.4, yMax: 1.4,
      });
      container.innerHTML = `<div class="viz-svg">${svg}</div>
        <p style="font-size:0.85em;color:#666;margin-top:0.5em;line-height:1.5;">sin 的高阶导数 4 阶一个周期。注意每条曲线相对前一条「向左平移 π/2」——这就是"求导 = 相位前移 90°"的几何对应。</p>`;
    },
  };
  if (renderers[id]) renderers[id]();
  else container.innerHTML = '<p style="color:#888;font-size:0.85em;">（可视化加载中…）</p>';
}

// ---------- State & Storage ----------
const STORAGE_KEY = 'calculus-tutorial-progress-v1';
function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {done: [], current: 1}; }
  catch (e) { return {done: [], current: 1}; }
}
function saveProgress(p) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch (e) {}
}
const state = loadProgress();

// ---------- Math rendering ----------
function renderAllMath(scope) {
  if (!window.__katexReady || !window.renderMathInElement) return;
  window.renderMathInElement(scope || document.body, {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '$', right: '$', display: false},
    ],
    throwOnError: false,
  });
}

// ---------- Renderers ----------
function renderNav() {
  const nav = document.getElementById('course-nav');
  const byMod = {};
  for (const l of LESSONS) (byMod[l.module] = byMod[l.module] || []).push(l);

  nav.innerHTML = MODULES.map(m => {
    const lessons = byMod[m.id] || [];
    const items = lessons.length
      ? lessons.map(l => `
          <li>
            <a href="#" data-lid="${l.id}"
               class="nav-item block px-3 py-1.5 rounded
                      ${state.current === l.id ? 'nav-active' : ''}
                      ${state.done.includes(l.id) ? 'nav-done' : ''}">
              <span class="text-xs text-[var(--muted)] mr-1">${l.id}.</span>${l.title}
            </a>
          </li>`).join('')
      : `<li class="px-3 py-1 text-xs text-[var(--muted)] italic">${m.desc}</li>`;
    return `
      <div>
        <div class="text-xs uppercase tracking-wider text-[var(--muted)] mb-1.5 px-3">
          ${m.id} · ${m.name}
        </div>
        <ul class="space-y-0.5">${items}</ul>
      </div>`;
  }).join('');

  nav.querySelectorAll('[data-lid]').forEach(a => {
    a.onclick = e => {
      e.preventDefault();
      navigateTo(parseInt(a.dataset.lid));
      // close mobile drawer
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('drawer-backdrop').classList.remove('open');
    };
  });

  // progress summary
  const doneCount = state.done.length;
  const total = LESSONS.length; // 10 so far
  document.getElementById('progress-summary').innerHTML =
    `已完成 <strong>${doneCount}</strong> / ${total} 节 · M1 + M2 + M3 全部上线`;
}

function renderLesson(id) {
  const lesson = LESSONS.find(l => l.id === id);
  if (!lesson) return;
  const view = document.getElementById('lesson-view');

  let sectionsHtml = '';
  for (const s of lesson.sections) {
    if (s.type === 'text') {
      sectionsHtml += `<div class="prose-body">${s.html}</div>`;
    } else if (s.type === 'viz') {
      sectionsHtml += `
        <div class="viz-wrap">
          <div class="text-xs text-[var(--muted)] mb-2">${s.label || '可视化'}</div>
          <div id="${s.id}-host"></div>
        </div>`;
    }
  }

  const exercisesHtml = lesson.exercises.map((ex, i) => {
    const hintHtml = ex.hint ? `
      <div class="mt-1 mb-1"><button class="ex-hint-btn">看提示</button></div>
      <div class="hint-block hidden ex-hint">
        <span class="text-xs uppercase tracking-wide font-semibold mr-1" style="color:#8c6b3a;">提示</span>
        ${ex.hint}
      </div>` : '';

    if (ex.type === 'mc') {
      return `
        <div class="lesson-card rounded-lg p-5 mb-4" data-ex="${i}" data-type="mc">
          <div class="text-xs text-[var(--muted)] mb-2">练习 ${i+1} · 选择题</div>
          <div class="ex-q mb-3">${ex.q}</div>
          ${hintHtml}
          <div class="space-y-2 ex-options mt-3">
            ${ex.options.map((opt, j) => `
              <button class="ex-option w-full text-left px-4 py-2.5 rounded-md" data-opt="${j}">
                <span class="text-[var(--muted)] mr-2">${String.fromCharCode(65+j)}.</span> ${opt}
              </button>`).join('')}
          </div>
          <div class="solution-block hidden ex-solution">
            <div class="text-xs uppercase tracking-wide font-semibold mb-1">解答</div>
            ${ex.solution}
          </div>
        </div>`;
    } else if (ex.type === 'fill') {
      return `
        <div class="lesson-card rounded-lg p-5 mb-4" data-ex="${i}" data-type="fill">
          <div class="text-xs text-[var(--muted)] mb-2">练习 ${i+1} · 填空题</div>
          <div class="ex-q mb-3">${ex.q} <input class="fill-input ex-input" placeholder="答案" /></div>
          ${hintHtml}
          <div class="flex gap-2 items-center text-sm mt-3 flex-wrap">
            <button class="ex-check px-3 py-1.5 rounded-md bg-[var(--accent)] text-white">检查</button>
            <button class="ex-show px-3 py-1.5 rounded-md border border-[var(--line)]">看解答</button>
            <span class="ex-feedback text-xs"></span>
          </div>
          <div class="solution-block hidden ex-solution">
            <div class="text-xs uppercase tracking-wide font-semibold mb-1">解答</div>
            ${ex.solution}
          </div>
        </div>`;
    }
    return '';
  }).join('');

  const doneClass = state.done.includes(id) ? 'bg-[var(--good)] text-white border-[var(--good)]' : 'border-[var(--line)] hover:bg-[var(--accent-soft)]';
  const doneLabel = state.done.includes(id) ? '✓ 已完成本节' : '标记本节为已完成';

  view.innerHTML = `
    <div class="text-xs text-[var(--muted)] uppercase tracking-wider mb-2">
      ${lesson.module} · ${MODULES.find(m => m.id === lesson.module).name} · 第 ${lesson.id} 节
    </div>
    <h1 class="serif text-3xl md:text-4xl font-semibold leading-tight mb-3">${lesson.title}</h1>
    <p class="text-lg text-[var(--muted)] mb-8 leading-relaxed">${lesson.hook}</p>

    ${sectionsHtml}

    <h2 class="serif text-2xl font-semibold mt-12 mb-4">练习</h2>
    ${exercisesHtml}

    <div class="mt-8">
      <button id="mark-done"
              class="px-4 py-2 rounded-md border ${doneClass} text-sm transition">
        ${doneLabel}
      </button>
    </div>
  `;

  // Render visualizations
  lesson.sections.filter(s => s.type === 'viz').forEach(s => {
    const host = document.getElementById(`${s.id}-host`);
    if (host) renderViz(s.id, host);
  });

  // Wire exercises
  view.querySelectorAll('[data-type="mc"]').forEach(card => {
    const i = parseInt(card.dataset.ex);
    const ex = lesson.exercises[i];
    card.querySelectorAll('.ex-option').forEach(btn => {
      btn.onclick = () => {
        const chosen = parseInt(btn.dataset.opt);
        card.querySelectorAll('.ex-option').forEach(b => b.classList.remove('correct', 'wrong', 'selected'));
        btn.classList.add('selected');
        if (chosen === ex.answer) {
          btn.classList.add('correct');
          card.querySelector('.ex-solution').classList.remove('hidden');
        } else {
          btn.classList.add('wrong');
          const right = card.querySelector(`[data-opt="${ex.answer}"]`);
          if (right) right.classList.add('correct');
          card.querySelector('.ex-solution').classList.remove('hidden');
        }
        renderAllMath(card);
      };
    });
  });

  view.querySelectorAll('[data-type="fill"]').forEach(card => {
    const i = parseInt(card.dataset.ex);
    const ex = lesson.exercises[i];
    const input = card.querySelector('.ex-input');
    const feedback = card.querySelector('.ex-feedback');

    const check = () => {
      const val = input.value.trim().replace(/\s+/g, '').toLowerCase();
      const accept = (ex.accept || [ex.answer]).map(a => String(a).trim().replace(/\s+/g,'').toLowerCase());
      let ok = accept.includes(val);
      if (!ok) {
        const numVal = parseFloat(val);
        const numAns = parseFloat(ex.answer);
        if (!isNaN(numVal) && !isNaN(numAns) && Math.abs(numVal - numAns) < 1e-6) ok = true;
      }
      input.classList.remove('correct', 'wrong');
      if (ok) {
        input.classList.add('correct');
        feedback.textContent = '✓ 正确';
        feedback.style.color = 'var(--good)';
        card.querySelector('.ex-solution').classList.remove('hidden');
        renderAllMath(card);
      } else {
        input.classList.add('wrong');
        feedback.textContent = '× 再想想';
        feedback.style.color = 'var(--bad)';
      }
    };

    card.querySelector('.ex-check').onclick = check;
    input.onkeydown = e => { if (e.key === 'Enter') check(); };
    card.querySelector('.ex-show').onclick = () => {
      card.querySelector('.ex-solution').classList.remove('hidden');
      renderAllMath(card);
    };
  });

  // Hint buttons (applies to both MC and fill)
  view.querySelectorAll('.ex-hint-btn').forEach(btn => {
    btn.onclick = () => {
      const card = btn.closest('[data-ex]');
      const hint = card.querySelector('.ex-hint');
      if (hint) {
        hint.classList.remove('hidden');
        btn.style.display = 'none';
        renderAllMath(card);
      }
    };
  });

  // Mark done
  document.getElementById('mark-done').onclick = () => {
    const idx = state.done.indexOf(id);
    if (idx === -1) state.done.push(id);
    else state.done.splice(idx, 1);
    saveProgress(state);
    renderNav();
    renderLesson(id);
  };

  // Prev/Next
  document.getElementById('prev-btn').disabled = id <= 1;
  document.getElementById('next-btn').disabled = id >= LESSONS.length;
  document.getElementById('prev-btn').onclick = () => navigateTo(id - 1);
  document.getElementById('next-btn').onclick = () => navigateTo(id + 1);

  renderAllMath();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function navigateTo(id) {
  if (id < 1 || id > LESSONS.length) return;
  state.current = id;
  saveProgress(state);
  renderNav();
  renderLesson(id);
}

// ---------- Init ----------
document.addEventListener('DOMContentLoaded', () => {
  renderNav();
  renderLesson(state.current);

  // mobile drawer
  const sidebar = document.getElementById('sidebar');
  const backdrop = document.getElementById('drawer-backdrop');
  document.getElementById('menu-btn')?.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    backdrop.classList.toggle('open');
  });
  backdrop.addEventListener('click', () => {
    sidebar.classList.remove('open');
    backdrop.classList.remove('open');
  });
});

// re-render math when katex finishes loading after content is built
window.renderAllMath = renderAllMath;
</script>
</body>
</html>
